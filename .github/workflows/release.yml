name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - run: mise run release -- --target ${{ matrix.target }}
      - run: |
          cp target/${{ matrix.target }}/release/apple-voice-memos-cli \
             apple-voice-memos-cli-${{ matrix.target }}
          shasum -a 256 apple-voice-memos-cli-${{ matrix.target }} > \
             apple-voice-memos-cli-${{ matrix.target }}.sha256
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            apple-voice-memos-cli-${{ matrix.target }}
            apple-voice-memos-cli-${{ matrix.target }}.sha256
          generate_release_notes: true
